<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Refresh Tracker | Mission Control</title>
    <meta name="description"
        content="A premium, dark-themed dashboard for tracking sensitive token refresh schedules with visual and audio alerts.">

    <!-- Design System -->
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="container">
        <header>
            <div class="title-area">
                <h1>Refresher Terminal</h1>
                <p class="subtitle">Secure Logic Monitoring — v2.0</p>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="total-count">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-item">
                    <div id="active-count" class="stat-value" style="color: var(--secondary)">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-item">
                    <div id="expired-count" class="stat-value" style="color: var(--danger)">0</div>
                    <div class="stat-label">Expired</div>
                </div>
            </div>
        </header>

        <!-- Command Center Input -->
        <section class="form-section">

            <form id="timer-form">
                <div class="form-row">
                    <div class="form-group email-group">
                        <label for="email">Target Email Identity</label>
                        <input type="email" id="email" placeholder="agent@mission.control" required autocomplete="off">
                        <div class="error-text" id="email-error"></div>
                    </div>
                    <div class="form-group duration-group">
                        <div class="duration-input">
                            <label for="days">Days</label>
                            <input type="number" id="days" min="0" max="365" value="0">
                        </div>
                        <div class="duration-input">
                            <label for="hours">Hours</label>
                            <input type="number" id="hours" min="0" max="23" value="0">
                        </div>
                        <div class="duration-input">
                            <label for="minutes">Minutes</label>
                            <input type="number" id="minutes" min="0" max="59" value="30">
                        </div>
                    </div>
                    <button type="submit">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"></path>
                        </svg>
                        Initiate
                    </button>
                </div>
            </form>
        </section>

        <!-- Instance Monitor -->
        <div id="timers-container">
            <div class="timers-grid" id="timers-grid"></div>
            
            <div class="empty-state" id="empty-state">
                <h3>Status: Silent</h3>
                <p>Deploy a refresh instance to begin terminal tracking.</p>
            </div>
        </div>
    </div>

    <!-- Interface Modals -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-box">
            <h3 class="form-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
                    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 00 2 2h14a2 2 0 00 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                Modify Instruction
            </h3>
            <form class="modal-form" id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-group" style="width: 100%;">
                    <label for="edit-email">Target Email Identity</label>
                    <input type="email" id="edit-email" required style="width: 100%;">
                    <div class="error-text" id="edit-email-error"></div>
                </div>
                <div class="form-group duration-group" style="margin-top: 1rem;">
                    <div class="duration-input">
                        <label for="edit-days">Days</label>
                        <input type="number" id="edit-days" min="0" max="365">
                    </div>
                    <div class="duration-input">
                        <label for="edit-hours">Hours</label>
                        <input type="number" id="edit-hours" min="0" max="23">
                    </div>
                    <div class="duration-input">
                        <label for="edit-minutes">Minutes</label>
                        <input type="number" id="edit-minutes" min="0" max="59">
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn-secondary" onclick="closeEditModal()"
                        style="flex: 1;">Cancel</button>
                    <button type="submit" style="flex: 1;">Commit</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-dialog">
        <div class="modal-box" style="max-width: 400px; text-align: center;">
            <h3 class="form-title" style="justify-content: center; color: var(--danger);">
                Terminate Instance?
            </h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">This will permanently purge the tracking log
                from the terminal.</p>
            <div style="display: flex; gap: 1rem;">
                <button type="button" class="btn-secondary" id="cancel-delete" style="flex: 1;">Abort</button>
                <button type="button" id="confirm-delete"
                    style="flex: 1; background: var(--danger); color: white;">Purge</button>
            </div>
        </div>
    </div>

    <!-- Core Script -->
    <script src="app.js"></script>
</body>

</html>
